{% extends 'gestion_agricole/base.html' %}

{% block title %}Modifier la Campagne{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark py-3">
                    <h3 class="card-title mb-0 h5"><i class="fas fa-edit me-2"></i>Modifier la Campagne Agricole</h3>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nom de la campagne</label>
                            {{ form.nom }}
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Date de début</label>
                                {{ form.date_debut }}
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Date de fin</label>
                                {{ form.date_fin }}
                            </div>
                        </div>

                        <div class="form-check form-switch mb-4">
                            {{ form.est_active }}
                            <label class="form-check-label ms-2">Campagne actuellement active</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success px-4">
                                <i class="fas fa-save me-2"></i>Enregistrer les modifications
                            </button>
                            <a href="{% url 'liste_campagnes' %}" class="btn btn-outline-secondary">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
